name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/eduhub

jobs:
  # ─── Go services ─────────────────────────────────────────────────────────────
  go-lint-test:
    name: Go – lint & test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - payment-service
          - user-service
          - course-service
          - funnel-service
          - api-gateway

    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: services/${{ matrix.service }}/go.mod

      - name: go mod tidy
        run: go mod tidy

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: services/${{ matrix.service }}

      - name: go test
        run: go test ./... -race -timeout 60s -coverprofile=coverage.out
        env:
          CGO_ENABLED: 1

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: services/${{ matrix.service }}/coverage.out
          flags: ${{ matrix.service }}

  # ─── Node services ────────────────────────────────────────────────────────────
  node-lint-test:
    name: Node – lint & test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - streaming-service
          - notification-service
          - content-service

    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

  # ─── Python service ───────────────────────────────────────────────────────────
  python-test:
    name: Python – test (ai-service)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/ai-service/requirements.txt

      - name: Install deps (runtime only needed for imports)
        run: |
          pip install fastapi pydantic python-jose numpy 2>/dev/null || true
          pip install pytest pytest-asyncio 2>/dev/null || true

      - name: Run match-score tests
        run: python test_match.py

  # ─── Build & push Docker images ───────────────────────────────────────────────
  docker-build:
    name: Docker build & push (${{ matrix.service }})
    needs: [go-lint-test, node-lint-test, python-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - payment-service
          - user-service
          - course-service
          - funnel-service
          - api-gateway
          - streaming-service
          - notification-service
          - content-service
          - ai-service

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy (optional – triggered only on main) ───────────────────────────────
  deploy:
    name: Deploy to production
    needs: [docker-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/eduhub
            git pull origin main
            docker compose pull
            docker compose up -d --remove-orphans
            docker system prune -f
