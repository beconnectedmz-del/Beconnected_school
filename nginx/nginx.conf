worker_processes auto;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    client_max_body_size 2G;

    # Docker internal DNS resolver — resolves upstreams lazily at request time
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m      rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m     rate=20r/m;
    limit_req_zone $binary_remote_addr zone=payment:10m  rate=30r/m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    server {
        listen 80;
        server_name _;

        # Health check — sem passar para upstream
        location = /nginx-health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # ── Auth (rate limit estrito) ────────────────────────────────────────────
        location /auth/ {
            limit_req zone=auth burst=10 nodelay;
            set $backend http://api-gateway:8080;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── Pagamentos ───────────────────────────────────────────────────────────
        location /payments/ {
            limit_req zone=payment burst=15 nodelay;
            set $backend http://api-gateway:8080;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── Streaming / WebSocket ─────────────────────────────────────────────────
        location /stream/ {
            set $stream http://streaming-service:8084;
            proxy_pass $stream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
        }

        location /socket.io/ {
            set $stream http://streaming-service:8084;
            proxy_pass $stream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400s;
        }

        # ── Upload (timeout longo) ────────────────────────────────────────────────
        location /content/upload {
            limit_req zone=api burst=5 nodelay;
            client_max_body_size 2G;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            set $backend http://api-gateway:8080;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_request_buffering off;
        }

        # ── API geral ─────────────────────────────────────────────────────────────
        location / {
            limit_req zone=api burst=50 nodelay;
            set $backend http://api-gateway:8080;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }
    }
}
