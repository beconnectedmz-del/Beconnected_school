version: '3.9'

networks:
  eduhub-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:

services:
  # ─── INFRA ───────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: eduhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - eduhub-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eduhub-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6381:6379"
    networks:
      - eduhub-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: eduhub-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - eduhub-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─── SERVICES ─────────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: eduhub-api-gateway
    restart: unless-stopped
    environment:
      PORT: 8080
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      AUTH_SERVICE_URL: http://auth-service:8081
      USER_SERVICE_URL: http://user-service:8082
      PAYMENT_SERVICE_URL: http://payment-service:8083
      STREAMING_SERVICE_URL: http://streaming-service:8084
      CONTENT_SERVICE_URL: http://content-service:8085
      AI_SERVICE_URL: http://ai-service:8086
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
      COURSE_SERVICE_URL: http://course-service:8088
      FUNNEL_SERVICE_URL: http://funnel-service:8089
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-60}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - eduhub-net

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: eduhub-auth
    restart: unless-stopped
    environment:
      PORT: 8081
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-24h}
      REFRESH_TOKEN_EXPIRY: ${REFRESH_TOKEN_EXPIRY:-720h}
      BCRYPT_COST: ${BCRYPT_COST:-12}
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eduhub-net

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: eduhub-user
    restart: unless-stopped
    environment:
      PORT: 8082
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      JWT_SECRET: ${JWT_SECRET}
      AI_SERVICE_URL: http://ai-service:8086
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_AVATARS: ${MINIO_BUCKET_AVATARS:-avatars}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eduhub-net

  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    container_name: eduhub-payment
    restart: unless-stopped
    environment:
      PORT: 8083
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/3
      JWT_SECRET: ${JWT_SECRET}
      PAYMENT_GATEWAY_KEY: ${PAYMENT_GATEWAY_KEY}
      PAYMENT_GATEWAY_SECRET: ${PAYMENT_GATEWAY_SECRET}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET}
      TEACHER_COMMISSION_RATE: ${TEACHER_COMMISSION_RATE:-70}
      PLATFORM_COMMISSION_RATE: ${PLATFORM_COMMISSION_RATE:-20}
      AFFILIATE_COMMISSION_RATE: ${AFFILIATE_COMMISSION_RATE:-10}
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
      PAYMENT_GATEWAY: ${PAYMENT_GATEWAY:-mpesa}
      MPESA_BASE_URL: ${MPESA_BASE_URL:-https://api.sandbox.vm.co.mz:8443}
      MPESA_API_KEY: ${MPESA_API_KEY}
      MPESA_PUBLIC_KEY: ${MPESA_PUBLIC_KEY}
      MPESA_SP_CODE: ${MPESA_SP_CODE}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eduhub-net

  streaming-service:
    build:
      context: ./services/streaming-service
      dockerfile: Dockerfile
    container_name: eduhub-streaming
    restart: unless-stopped
    environment:
      PORT: 8084
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/4
      JWT_SECRET: ${JWT_SECRET}
      MAX_ROOM_PARTICIPANTS: ${MAX_ROOM_PARTICIPANTS:-50}
      RECORDING_ENABLED: ${RECORDING_ENABLED:-true}
      NODE_CLUSTER_WORKERS: ${NODE_CLUSTER_WORKERS:-4}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - eduhub-net

  content-service:
    build:
      context: ./services/content-service
      dockerfile: Dockerfile
    container_name: eduhub-content
    restart: unless-stopped
    environment:
      PORT: 8085
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_VIDEOS: ${MINIO_BUCKET_VIDEOS:-videos}
      MINIO_BUCKET_MATERIALS: ${MINIO_BUCKET_MATERIALS:-materials}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-2048}
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - eduhub-net

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: eduhub-ai
    restart: unless-stopped
    environment:
      PORT: 8086
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/5
      MATCH_ALGORITHM: ${MATCH_ALGORITHM:-weighted_score}
      RECOMMENDATION_LIMIT: ${RECOMMENDATION_LIMIT:-10}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eduhub-net

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: eduhub-notification
    restart: unless-stopped
    environment:
      PORT: 8087
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/6
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eduhub-net

  course-service:
    build:
      context: ./services/course-service
      dockerfile: Dockerfile
    container_name: eduhub-course
    restart: unless-stopped
    environment:
      PORT: 8088
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eduhub-net

  funnel-service:
    build:
      context: ./services/funnel-service
      dockerfile: Dockerfile
    container_name: eduhub-funnel
    restart: unless-stopped
    environment:
      PORT: 8089
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eduhub-net

  # ─── FRONTEND ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eduhub-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "3002:3000"
    depends_on:
      - api-gateway
    networks:
      - eduhub-net

  # ─── REVERSE PROXY ────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: eduhub-nginx
    restart: unless-stopped
    ports:
      - "8090:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api-gateway
      - streaming-service
    networks:
      - eduhub-net
